<!DOCTYPE html>
<html>
<head>
    <title>Logo Test</title>
</head>
<body style="background: #333; padding: 50px;">
    <h1 style="color: white;">Logo Display Test</h1>
    
    <h2 style="color: white;">1. Raw logo (no filter)</h2>
    <img src="Logo-Cropped.png" alt="Logo Raw" style="width: 200px; border: 2px solid red;">
    
    <h2 style="color: white;">2. Logo with white filter</h2>
    <img src="Logo-Cropped.png" alt="Logo White" style="width: 200px; filter: brightness(0) invert(1); border: 2px solid red;">
    
    <h2 style="color: white;">3. QR Code (for comparison)</h2>
    <img src="qr-code.png" alt="QR" style="width: 200px; border: 2px solid red;">
</body>
</html>
