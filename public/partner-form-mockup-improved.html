<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OraChope - Dental Clinic Partnership Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .form-input {
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .submit-btn {
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        /* Tooltip Styles */
        .tooltip-container {
            position: relative;
            display: inline-block;
        }
        
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            background-color: rgba(17, 24, 39, 0.95);
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            font-size: 12px;
            line-height: 1.5;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(17, 24, 39, 0.95) transparent transparent transparent;
        }
        
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        .info-icon {
            cursor: help;
            color: #3B82F6;
            transition: color 0.2s;
        }
        
        .info-icon:hover {
            color: #2563EB;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-white text-gray-900 overflow-x-hidden">
    <!-- Compact Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-4 py-3 shadow-md">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-lg font-bold">OraChope.org</span>
            </div>
            <a href="/" class="text-sm text-blue-100 hover:text-white">← Back</a>
        </div>
    </div>

    <!-- Main Content - Single Page Layout -->
    <div class="px-4 py-6">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white shadow-xl border border-blue-100 rounded-lg">
                <!-- Compact Header -->
                <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-4 rounded-t-lg">
                    <h1 class="text-2xl font-bold">Dental Clinic Partnership Application</h1>
                    <p class="text-blue-100 text-sm">Join our network to connect with Singapore patients</p>
                </div>

                <!-- Compact Form -->
                <div class="px-6 py-5">
                    <form class="space-y-4" onsubmit="handleSubmit(event)">
                        
                        <!-- Grid Layout: Location + Clinic Selection -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 mb-1">Clinic Location</label>
                                <select class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500" onchange="updateClinicDropdown(this.value)">
                                    <option value="jb" selected>Johor Bahru (JB)</option>
                                    <option value="sg">Singapore (SG)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 mb-1">Select Your Clinic</label>
                                <select id="clinicSelect" class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500" onchange="updateClinicAddress(this.value)">
                                    <option value="">-- Select Clinic --</option>
                                    <option value="113">JDental Specialists</option>
                                    <option value="216" selected>Idea Dental (Mount Austin)</option>
                                    <option value="217">Pink and White Dental</option>
                                </select>
                            </div>
                        </div>

                        <!-- Compact Address -->
                        <div class="bg-blue-50 border border-blue-200 rounded-md p-3">
                            <label class="block text-xs font-semibold text-gray-700 mb-1">
                                📍 Clinic Address <span class="text-xs font-normal text-blue-600">(auto-filled)</span>
                            </label>
                            <input 
                                id="clinicAddress"
                                type="text" 
                                value="77, Jalan Mutiara Emas 2A, Taman Mount Austin, 81100 Johor Bahru"
                                readonly
                                class="w-full px-3 py-2 text-sm bg-gray-100 border border-gray-300 rounded-md text-gray-700 cursor-not-allowed"
                            />
                        </div>

                        <!-- Row 1: Contact Person, Email, Phone (3 columns) -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-800 mb-1">Contact Person *</label>
                                <input 
                                    type="text" 
                                    placeholder="Dr. John Smith"
                                    required
                                    class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-800 mb-1">Email Address *</label>
                                <input 
                                    type="email" 
                                    placeholder="clinic@example.com"
                                    required
                                    class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-800 mb-1">Phone *</label>
                                <input 
                                    type="tel" 
                                    placeholder="+60 12 345 6789"
                                    required
                                    class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                        </div>

                        <!-- City (compact) -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-800 mb-1">City *</label>
                                <input 
                                    type="text" 
                                    placeholder="Johor Bahru"
                                    required
                                    class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                        </div>

                        <!-- PROFESSIONAL REGISTRATION SECTION -->
                        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-4">
                            <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                Professional Registration Details
                            </h3>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- Clinic License (Form 7) with Tooltip -->
                                <div>
                                    <label class="block text-xs font-semibold text-gray-800 mb-1 flex items-center gap-1">
                                        🏥 Clinic License (Form 7) *
                                        <div class="tooltip-container">
                                            <svg class="w-4 h-4 info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                            <div class="tooltip-text">
                                                <strong>What is Form 7?</strong><br>
                                                Certificate of Registration from <strong>Ministry of Health (MOH)</strong><br><br>
                                                <strong>Format examples:</strong><br>
                                                • JHR/DC/2023/0045 (Johor)<br>
                                                • MOH/PHFS/1234 (Federal)<br><br>
                                                <strong>Where to find:</strong><br>
                                                Certificate displayed at your clinic reception
                                            </div>
                                        </div>
                                    </label>
                                    <input 
                                        type="text" 
                                        placeholder="JHR/DC/2023/0045"
                                        required
                                        class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 font-mono bg-white"
                                    />
                                </div>

                                <!-- Dentist License (MDC) with Tooltip -->
                                <div>
                                    <label class="block text-xs font-semibold text-gray-800 mb-1 flex items-center gap-1">
                                        👨‍⚕️ Dentist License (MDC) *
                                        <div class="tooltip-container">
                                            <svg class="w-4 h-4 info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                            <div class="tooltip-text">
                                                <strong>What is MDC Number?</strong><br>
                                                Your personal registration with <strong>Malaysian Dental Council</strong><br><br>
                                                <strong>Format:</strong> DEN/##### <br>
                                                (e.g., DEN/08234)<br><br>
                                                <strong>Where to find:</strong><br>
                                                Your MDC certificate or APC<br><br>
                                                <strong>Verification:</strong><br>
                                                We check <a href="https://www.mdc.org.my/" target="_blank" class="text-blue-300 underline">MDC public registry</a>
                                            </div>
                                        </div>
                                    </label>
                                    <input 
                                        type="text" 
                                        placeholder="DEN/12345"
                                        pattern="DEN\/\d{4,6}"
                                        required
                                        class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 font-mono bg-white"
                                    />
                                </div>
                            </div>
                        </div>

                        <!-- Services Offered -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-800 mb-1">Services Offered *</label>
                            <textarea 
                                placeholder="General Dentistry, Orthodontics, Implants..."
                                required
                                rows="2"
                                class="form-input w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 resize-none"
                            ></textarea>
                        </div>

                        <!-- Password + AI Features in one row -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="relative">
                                <label class="block text-xs font-semibold text-gray-700 mb-1">Password *</label>
                                <input 
                                    id="passwordInput"
                                    type="password" 
                                    placeholder="Min. 6 characters"
                                    minlength="6"
                                    required
                                    class="form-input w-full px-3 py-2 pr-10 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                                />
                                <button 
                                    type="button" 
                                    onclick="togglePassword()"
                                    class="absolute right-2 top-7 text-gray-500 hover:text-gray-700"
                                >
                                    <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                </button>
                            </div>
                            
                            <!-- AI Features -->
                            <div class="bg-purple-50 border border-purple-200 rounded-md p-3">
                                <h3 class="text-xs font-semibold text-gray-800 mb-2">🤖 AI Features (Optional)</h3>
                                <div class="space-y-2">
                                    <label class="flex items-center gap-2 cursor-pointer text-xs">
                                        <input type="checkbox" class="w-3 h-3 text-blue-600 rounded">
                                        <span>Clinic's Sentiment Analysis</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer text-xs">
                                        <input type="checkbox" class="w-3 h-3 text-blue-600 rounded">
                                        <span>Market Analysis</span>
                                    </label>
                                    <label class="flex items-start gap-2 cursor-pointer text-xs">
                                        <input type="checkbox" class="w-3 h-3 text-blue-600 rounded mt-0.5">
                                        <span class="flex-1">
                                            Others:
                                            <input 
                                                type="text" 
                                                placeholder="Specify other AI features..."
                                                class="w-full mt-1 px-2 py-1 text-xs border border-purple-300 rounded focus:ring-1 focus:ring-purple-500 bg-white"
                                            />
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button - Option B: Modern Elevated Style -->
                        <div class="pt-4 mt-2 border-t border-gray-200">
                            <button 
                                type="submit"
                                class="submit-btn w-full bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:from-blue-600 hover:via-blue-700 hover:to-blue-800 text-white font-bold py-3 px-6 rounded-lg shadow-[0_8px_20px_rgba(59,130,246,0.4)] hover:shadow-[0_10px_25px_rgba(59,130,246,0.5)] hover:scale-[1.02] transition-all duration-200 flex items-center justify-center gap-2 text-sm"
                                style="transform: translateZ(0);"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                                Submit Partnership Application
                            </button>
                        </div>

                        <p class="text-center text-xs text-gray-500">
                            By submitting, you agree to our Terms. We'll review within 5 business days.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-50 border-t border-gray-200 py-8 px-4 mt-16">
        <div class="max-w-3xl mx-auto text-center text-sm text-gray-600">
            <p>&copy; 2026 OraChope.org. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7 1.274-4.057 5.065-7 9.543-7 4.478 0 8.268 2.943 9.542 7a9.91 9.91 0 01-1.617 3.312m-6.431 5.068a3 3 0 01-5.868-.225 3 3 0 015.632-1.993"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"></path>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        function updateClinicAddress(clinicId) {
            const addresses = {
                '113': '71, Jalan Harimau Tarum, Taman Abad, 80250 Johor Bahru, Johor',
                '216': '77, Jalan Mutiara Emas 2A, Taman Mount Austin, 81100 Johor Bahru, Johor Darul Ta\'zim, Malaysia',
                '217': 'A-03-08, Blok A, 1 Tebrau, Jln Seri Setanggi, Jalan Tebrau, 80250 Johor Bahru, Johor, Malaysia'
            };
            
            const addressInput = document.getElementById('clinicAddress');
            if (clinicId && addresses[clinicId]) {
                addressInput.value = addresses[clinicId];
            } else {
                addressInput.value = '';
            }
        }

        function updateClinicDropdown(location) {
            const select = document.getElementById('clinicSelect');
            const addressInput = document.getElementById('clinicAddress');
            
            if (location === 'jb') {
                select.innerHTML = `
                    <option value="">-- Select Clinic --</option>
                    <option value="113">JDental Specialists</option>
                    <option value="216" selected>Idea Dental (Mount Austin)</option>
                    <option value="217">Pink and White Dental (PNW DENTAL SDN BHD)</option>
                `;
                addressInput.value = '77, Jalan Mutiara Emas 2A, Taman Mount Austin, 81100 Johor Bahru, Johor Darul Ta\'zim, Malaysia';
            } else {
                select.innerHTML = `
                    <option value="">-- Select Clinic --</option>
                    <option value="sg1">ABC Dental Clinic (SG)</option>
                    <option value="sg2">Bright Smile Clinic (SG)</option>
                `;
                addressInput.value = '';
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            alert('✅ Form submission successful!\n\n🎯 This is a COMPACT mockup - no data submitted.\n\n✨ Key improvements:\n• Single-page form (no scrolling needed!)\n• Hover-based tooltips for registration info\n• Clinic License (Form 7) + MDC Number fields\n• Auto-populated clinic address\n• Compact grid layouts\n• All necessary fields retained');
            return false;
        }

        // Initialize address on load
        window.onload = function() {
            updateClinicAddress('216');
        };
    </script>
</body>
</html>
