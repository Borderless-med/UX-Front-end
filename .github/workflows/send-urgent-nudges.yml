name: Send Urgent Nudges

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  send-nudges:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Prevent hanging jobs
    steps:
      - name: Ping Vercel endpoint with retry
        run: |
          MAX_ATTEMPTS=3
          RETRY_WAIT=10
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            
            response=$(curl -s -w "\n%{http_code}" \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              https://www.orachope.org/api/cron?job=send-urgent-nudges)
            
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            
            echo "HTTP Status: $http_code"
            echo "Response: $body"
            
            if [ "$http_code" -eq 200 ]; then
              echo "✅ Successfully sent urgent nudges"
              exit 0
            fi
            
            echo "❌ Attempt $attempt failed with status $http_code"
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${RETRY_WAIT}s before retry..."
              sleep $RETRY_WAIT
            fi
          done
          
          echo "❌ All $MAX_ATTEMPTS attempts failed"
          exit 1
